<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaPipe Guitar App - Khử Rung Giật Triệt Để</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Hệ Thống Khử Rung Giật (Anti-Jitter) & Định Vị Đa Tay</h1>
    <p>Nhấp chuột một lần vào màn hình để kích hoạt âm thanh • Tay Trái (Xanh dương) chọn nút • Tay Phải (Vàng) gảy đàn
    </p>
    <div class="app-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas" width="1280" height="720"></canvas>
    </div>

    <script src="app.js"></script>
